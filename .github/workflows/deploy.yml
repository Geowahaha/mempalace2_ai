name: Deploy to Tencent VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          INSTALL_OLLAMA: ${{ secrets.INSTALL_OLLAMA }}
        with:
          host: ${{ secrets.TENCENT_VM_HOST }}
          username: ${{ secrets.TENCENT_VM_USER }}
          key: ${{ secrets.TENCENT_VM_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: GH_PAT,INSTALL_OLLAMA
          script: |
            set -euo pipefail
            APP_DIR="/opt/mempalace_ai"
            APP_USER="$(id -un)"
            REPO_URL="https://${GH_PAT}@github.com/Geowahaha/mempalace2_ai.git"

            if [ -z "${GH_PAT:-}" ]; then
              echo "GH_PAT secret is missing."
              exit 1
            fi

            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown "$APP_USER:$APP_USER" "$APP_DIR"
              git clone --branch main "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --all --prune
            git checkout main
            git pull --ff-only

            sudo REPO_URL="$REPO_URL" \
                 APP_USER="$APP_USER" \
                 APP_DIR="$APP_DIR" \
                 BRANCH=main \
                 INSTALL_OLLAMA="${INSTALL_OLLAMA:-0}" \
                 bash ops/tencent_mempalace_setup.sh

            sudo systemctl restart mempalace-trader
            sleep 5
            STATUS="$(sudo systemctl is-active mempalace-trader || true)"
            echo "Service status: ${STATUS}"
            if [ "${STATUS}" != "active" ] && [ "${STATUS}" != "activating" ]; then
              echo "ERROR: mempalace-trader is not running."
              sudo journalctl -u mempalace-trader -n 80 --no-pager || true
              exit 1
            fi
